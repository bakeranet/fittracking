<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>FitTrack — Tu plan de transformación</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D0D0F;
  --card: #16161A;
  --border: #2A2A32;
  --accent: #6EE7A8;
  --accent-bg: rgba(110,231,168,0.08);
  --accent-border: rgba(110,231,168,0.2);
  --orange: #F4A261;
  --blue: #7CB9E8;
  --pink: #E88CB4;
  --purple: #B4A0E8;
  --red: #E85D5D;
  --text: #EAEAEF;
  --text-mid: #9999A8;
  --text-dim: #5A5A6A;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; }
body { font-family:'DM Sans',-apple-system,sans-serif; background:var(--bg); color:var(--text); overscroll-behavior:none; }
.app { display:flex; flex-direction:column; height:100dvh; max-width:430px; margin:0 auto; }
.header { padding:calc(var(--safe-top) + 12px) 20px 12px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.header-title { font-size:19px; font-weight:700; letter-spacing:-0.5px; }
.header-sub { font-size:11px; color:var(--text-dim); margin-top:2px; }
.header-weight { text-align:right; }
.header-weight .val { font-size:22px; font-weight:700; color:var(--accent); }
.header-weight .label { font-size:10px; color:var(--text-dim); }
.content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:0 16px 100px; scroll-behavior:smooth; }
.content::-webkit-scrollbar { display:none; }
.nav { flex-shrink:0; display:flex; background:var(--card); border-top:1px solid var(--border); padding:6px 4px calc(var(--safe-bottom) + 6px); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 2px; border:none; background:none; color:var(--text-dim); font-size:9px; font-family:inherit; cursor:pointer; border-radius:8px; transition:all 0.2s; }
.nav-btn.active { color:var(--accent); }
.nav-btn .icon { font-size:20px; line-height:1; }
.card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:16px; margin-bottom:14px; }
.card-title { font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stat { border-radius:12px; padding:14px; border:1px solid transparent; }
.stat.green { background:rgba(110,231,168,0.06); border-color:rgba(110,231,168,0.12); }
.stat.blue { background:rgba(124,185,232,0.06); border-color:rgba(124,185,232,0.12); }
.stat.orange { background:rgba(244,162,97,0.06); border-color:rgba(244,162,97,0.12); }
.stat.pink { background:rgba(232,140,180,0.06); border-color:rgba(232,140,180,0.12); }
.stat-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.stat-val { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.stat.green .stat-val { color:var(--accent); }
.stat.blue .stat-val { color:var(--blue); }
.stat.orange .stat-val { color:var(--orange); }
.stat.pink .stat-val { color:var(--pink); }
.progress-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:8px 0; }
.progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--blue)); transition:width 0.6s cubic-bezier(0.22,1,0.36,1); }
.progress-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); }
.progress-pct { color:var(--accent); font-weight:600; }
.week-strip { display:flex; gap:6px; }
.week-day { flex:1; text-align:center; padding:10px 2px; border-radius:10px; cursor:pointer; border:1px solid var(--border); background:var(--bg); transition:all 0.2s; }
.week-day.done { border-color:var(--accent-border); background:var(--accent-bg); }
.week-day .d-name { font-size:10px; color:var(--text-dim); margin-bottom:5px; }
.week-day .d-icon { font-size:18px; margin-bottom:3px; }
.week-day .d-status { font-size:9px; font-weight:600; color:var(--text-dim); }
.week-day.done .d-status { color:var(--accent); }
.input-row { display:flex; gap:10px; }
.input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-size:16px; font-family:inherit; outline:none; transition:border-color 0.2s; }
.input:focus { border-color:var(--accent); }
.input::placeholder { color:var(--text-dim); }
textarea.input { min-height:110px; resize:none; line-height:1.6; font-size:14px; }
.btn { background:var(--accent); color:var(--bg); border:none; border-radius:10px; padding:12px 22px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.btn:active { transform:scale(0.96); opacity:0.9; }
.btn-danger { background:transparent; border:1px solid rgba(232,93,93,0.3); color:var(--red); border-radius:10px; padding:10px 20px; font-size:12px; font-family:inherit; cursor:pointer; }
.meal-item { display:flex; align-items:center; gap:12px; padding:14px; border-radius:10px; margin-bottom:6px; cursor:pointer; background:var(--bg); border:1px solid var(--border); transition:all 0.15s; }
.meal-item.done { background:var(--accent-bg); border-color:var(--accent-border); }
.meal-check { width:24px; height:24px; border-radius:7px; border:2px solid var(--text-dim); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; flex-shrink:0; transition:all 0.15s; }
.meal-item.done .meal-check { background:var(--accent); border-color:var(--accent); color:var(--bg); }
.meal-name { font-size:14px; color:var(--text-mid); }
.meal-item.done .meal-name { color:var(--text); font-weight:500; }
.day-tabs { display:flex; gap:4px; margin-bottom:14px; overflow-x:auto; }
.day-tabs::-webkit-scrollbar { display:none; }
.day-tab { padding:7px 14px; border-radius:8px; border:none; font-size:13px; font-family:inherit; font-weight:500; cursor:pointer; background:transparent; color:var(--text-dim); white-space:nowrap; flex-shrink:0; transition:all 0.15s; }
.day-tab.active { background:var(--accent-bg); color:var(--accent); }
.compliance { display:flex; align-items:baseline; gap:8px; margin-bottom:8px; }
.compliance-val { font-size:40px; font-weight:700; color:var(--accent); letter-spacing:-1px; }
.compliance-label { font-size:13px; color:var(--text-dim); }
.history-item { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
.history-item:last-child { border-bottom:none; }
.history-date { font-size:13px; color:var(--text-mid); }
.history-val { font-size:15px; font-weight:600; }
.note-entry { padding:14px 0; border-bottom:1px solid var(--border); }
.note-entry:last-child { border-bottom:none; }
.note-date { font-size:11px; color:var(--text-dim); margin-bottom:4px; }
.note-text { font-size:13px; color:var(--text-mid); line-height:1.5; }
.chart-container { position:relative; height:180px; margin-top:8px; }
.chart-canvas { width:100%; height:100%; }
.tip { font-size:11px; color:var(--text-dim); margin-top:8px; line-height:1.4; }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:var(--bg); padding:10px 24px; border-radius:10px; font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.22,1,0.36,1); z-index:999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.section { display:none; }
.section.visible { display:block; }
.weight-change { font-size:13px; margin-top:8px; font-weight:500; }
.weight-change.loss { color:var(--accent); }
.weight-change.gain { color:var(--red); }

/* Workout / Menu plan styles */
.plan-day { border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
.plan-day-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; transition:background 0.15s; }
.plan-day-header:active { background:var(--card); }
.plan-day-left { display:flex; align-items:center; gap:10px; }
.plan-badge { font-size:10px; font-weight:600; padding:3px 10px; border-radius:6px; text-transform:uppercase; letter-spacing:0.4px; }
.plan-day-title { font-size:14px; font-weight:600; }
.plan-day-meta { font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:4px; }
.plan-day-body { display:none; padding:0 16px 16px; }
.plan-day.open .plan-day-body { display:block; }
.plan-day.open .chevron { transform:rotate(180deg); }
.chevron { transition:transform 0.2s; font-size:14px; color:var(--text-dim); }

.ex-table { width:100%; font-size:13px; border-collapse:collapse; }
.ex-table th { text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); padding:8px 4px; border-bottom:1px solid var(--border); font-weight:500; }
.ex-table td { padding:10px 4px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:top; }
.ex-table tr:last-child td { border-bottom:none; }
.ex-name { font-weight:600; font-size:13px; }
.ex-note { font-size:11px; color:var(--text-dim); margin-top:2px; }
.ex-group td { padding:8px 4px !important; font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; background:rgba(255,255,255,0.02); }

.meal-plan-item { padding:12px 0; border-bottom:1px solid var(--border); }
.meal-plan-item:last-child { border-bottom:none; }
.meal-plan-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.meal-plan-label { font-size:13px; font-weight:600; color:var(--text); }
.meal-plan-kcal { font-size:11px; color:var(--text-dim); background:rgba(255,255,255,0.05); padding:2px 8px; border-radius:6px; }
.meal-plan-desc { font-size:13px; color:var(--text-mid); line-height:1.55; }
.meal-plan-macros { font-size:11px; color:var(--text-dim); margin-top:4px; display:flex; gap:10px; }
.mp { color:var(--blue); }
.mc { color:var(--accent); }
.mg { color:var(--orange); }

.kcal-summary { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:14px; }
.kcal-summary-val { font-size:20px; font-weight:700; }
.kcal-summary-macros { font-size:12px; color:var(--text-dim); }

.run-info { font-size:13px; color:var(--text-mid); line-height:1.6; padding:8px 0; }
.run-info strong { color:var(--text); font-weight:600; }

@keyframes pop { 0%{transform:scale(0.95);opacity:0} 100%{transform:scale(1);opacity:1} }
.card { animation:pop 0.25s cubic-bezier(0.22,1,0.36,1); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">FitTrack</div>
      <div class="header-sub">82 kg → 75 kg · déficit ~500 kcal</div>
    </div>
    <div class="header-weight">
      <div class="val" id="headerWeight">82.0</div>
      <div class="label">kg actual</div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="section visible" id="sec-dashboard"></div>
    <div class="section" id="sec-weight"></div>
    <div class="section" id="sec-meals"></div>
    <div class="section" id="sec-gym"></div>
    <div class="section" id="sec-menu"></div>
    <div class="section" id="sec-notes"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="icon">◉</span>Inicio</button>
    <button class="nav-btn" data-tab="weight" onclick="switchTab('weight')"><span class="icon">⚖</span>Peso</button>
    <button class="nav-btn" data-tab="meals" onclick="switchTab('meals')"><span class="icon">✓</span>Check</button>
    <button class="nav-btn" data-tab="gym" onclick="switchTab('gym')"><span class="icon">🏋</span>Gym</button>
    <button class="nav-btn" data-tab="menu" onclick="switchTab('menu')"><span class="icon">🍽</span>Menú</button>
    <button class="nav-btn" data-tab="notes" onclick="switchTab('notes')"><span class="icon">📝</span>Notas</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

let state = loadState();
let currentTab = "dashboard";
let selectedMealDay = todayDayIdx();
let selectedMenuDay = 0;
let selectedGymDay = 0;

function defaultState(){return{weights:[],workouts:{},meals:{},notes:{},startWeight:82,goalWeight:75}}
function loadState(){try{const r=localStorage.getItem(STORAGE);if(r)return JSON.parse(r)}catch{}return defaultState()}
function saveState(){try{localStorage.setItem(STORAGE,JSON.stringify(state))}catch{}}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function todayDayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function weekId(){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()+4-day);const ys=new Date(d.getFullYear(),0,1);const wn=Math.ceil(((d-ys)/86400000+1)/7);return`${d.getFullYear()}-W${String(wn).padStart(2,"0")}`}
function latestWeight(){if(!state.weights.length)return state.startWeight;const s=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));return s[s.length-1].value}
function weightChange(){if(state.weights.length<2)return null;const s=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));return Math.round((s[s.length-1].value-s[0].value)*10)/10}
function progressPct(){const lw=latestWeight();return Math.min(100,Math.max(0,Math.round(((state.startWeight-lw)/(state.startWeight-state.goalWeight))*100)))}
function weekWorkouts(){const wk=weekId();return DAYS.map((_,i)=>!!state.workouts[`${wk}-${i}`])}
function weekMeals(dayIdx){const wk=weekId();return MEALS_CHECK.map((_,mi)=>!!state.meals[`${wk}-${dayIdx}-${mi}`])}
function mealCompliancePct(){const wk=weekId();let t=0,d=0;for(let i=0;i<7;i++)for(let m=0;m<MEALS_CHECK.length;m++){t++;if(state.meals[`${wk}-${i}-${m}`])d++}return t?Math.round((d/t)*100):0}
function escapeHtml(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}

let toastTimer;
function showToast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("show"),2000)}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("visible"));
  document.getElementById(`sec-${tab}`).classList.add("visible");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("content").scrollTop=0;
  render();
}

function updateHeader(){document.getElementById("headerWeight").textContent=latestWeight().toFixed(1)}

function render(){
  updateHeader();
  switch(currentTab){
    case"dashboard":renderDashboard();break;
    case"weight":renderWeight();break;
    case"meals":renderMeals();break;
    case"gym":renderGym();break;
    case"menu":renderMenu();break;
    case"notes":renderNotes();break;
  }
}

function renderDashboard(){
  const ww=weekWorkouts();const todayM=weekMeals(todayDayIdx());const pp=progressPct();const wc=weightChange();
  let h=`
    <div class="stats">
      <div class="stat green"><div class="stat-label">Peso actual</div><div class="stat-val">${latestWeight().toFixed(1)} kg</div></div>
      <div class="stat blue"><div class="stat-label">Objetivo</div><div class="stat-val">${state.goalWeight} kg</div></div>
      <div class="stat orange"><div class="stat-label">Entrenos</div><div class="stat-val">${ww.filter(Boolean).length}/6</div></div>
      <div class="stat pink"><div class="stat-label">Comidas hoy</div><div class="stat-val">${todayM.filter(Boolean).length}/${MEALS_CHECK.length}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Progreso</div>
      <div class="progress-labels"><span>${state.startWeight} kg</span><span class="progress-pct">${pp}%</span><span>${state.goalWeight} kg</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pp}%"></div></div>
      ${wc!==null?`<div class="weight-change ${wc<=0?'loss':'gain'}">${wc<=0?'↓':'↑'} ${Math.abs(wc)} kg desde el inicio</div>`:''}
    </div>
    <div class="card">
      <div class="card-title">Semana actual</div>
      <div class="week-strip">${DAYS.map((d,i)=>{const done=ww[i];const wo=WORKOUTS[i];return`<div class="week-day ${done?'done':''}" onclick="toggleWorkout(${i})"><div class="d-name">${d}</div><div class="d-icon">${wo.icon}</div><div class="d-status">${done?'✓':wo.type.split(' ')[0]}</div></div>`}).join('')}</div>
    </div>`;
  if(state.weights.length>1)h+=`<div class="card"><div class="card-title">Evolución</div><div class="chart-container"><canvas class="chart-canvas" id="weightChart"></canvas></div></div>`;
  document.getElementById("sec-dashboard").innerHTML=h;
  if(state.weights.length>1)drawChart();
}

function renderWeight(){
  const sorted=[...state.weights].sort((a,b)=>b.date.localeCompare(a.date));
  let h=`<div class="card"><div class="card-title">Registrar peso de hoy</div><div class="input-row"><input class="input" type="number" step="0.1" inputmode="decimal" placeholder="Ej: 81.5" id="weightInput"><button class="btn" onclick="addWeight()">Guardar</button></div><div class="tip">Pésate por la mañana, en ayunas, después del baño.</div></div>`;
  if(sorted.length){h+=`<div class="card"><div class="card-title">Historial</div>`;sorted.forEach(w=>{h+=`<div class="history-item"><span class="history-date">${w.date}</span><span class="history-val">${w.value} kg</span></div>`});h+=`</div>`}
  document.getElementById("sec-weight").innerHTML=h;
  const input=document.getElementById("weightInput");if(input)input.addEventListener("keydown",e=>{if(e.key==="Enter")addWeight()});
}

function renderMeals(){
  const dm=weekMeals(selectedMealDay);const cp=mealCompliancePct();
  let h=`<div class="day-tabs">${DAYS.map((d,i)=>`<button class="day-tab ${selectedMealDay===i?'active':''}" onclick="selectMealDay(${i})">${d}</button>`).join('')}</div>
    <div class="card"><div class="card-title" style="display:flex;justify-content:space-between"><span>${FULL_DAYS[selectedMealDay]}</span><span style="color:var(--accent)">${dm.filter(Boolean).length}/${MEALS_CHECK.length}</span></div>
    ${MEALS_CHECK.map((m,mi)=>{const done=dm[mi];return`<div class="meal-item ${done?'done':''}" onclick="toggleMeal(${selectedMealDay},${mi})"><div class="meal-check">${done?'✓':''}</div><span class="meal-name">${m}</span></div>`}).join('')}</div>
    <div class="card"><div class="card-title">Adherencia semanal</div><div class="compliance"><span class="compliance-val">${cp}%</span><span class="compliance-label">comidas completadas</span></div><div class="progress-track"><div class="progress-fill" style="width:${cp}%"></div></div></div>`;
  document.getElementById("sec-meals").innerHTML=h;
}

function renderGym(){
  let h=`<div class="day-tabs">${GYM_PLAN.map((d,i)=>`<button class="day-tab ${selectedGymDay===i?'active':''}" onclick="selectGymDay(${i})">${DAYS[i]}</button>`).join('')}</div>`;
  const d=GYM_PLAN[selectedGymDay];
  h+=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px"><span class="plan-badge" style="background:${d.badgeColor}22;color:${d.badgeColor}">${d.badge}</span><span style="font-size:15px;font-weight:600">${d.day}</span></div><span style="font-size:12px;color:var(--text-dim)">${d.time}</span></div>`;
  if(d.runInfo)h+=`<div class="run-info">${d.runInfo}</div>`;
  if(d.exercises.length){
    h+=`<table class="ex-table"><thead><tr><th>Ejercicio</th><th>Series</th><th>Reps</th><th>Desc.</th></tr></thead><tbody>`;
    d.exercises.forEach(ex=>{
      if(ex.group){h+=`<tr class="ex-group"><td colspan="4">● ${ex.group}</td></tr>`}
      else{h+=`<tr><td><div class="ex-name">${ex.name}</div>${ex.note?`<div class="ex-note">${ex.note}</div>`:''}</td><td>${ex.sets}</td><td>${ex.reps}</td><td>${ex.rest}</td></tr>`}
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;
  document.getElementById("sec-gym").innerHTML=h;
}

function renderMenu(){
  let h=`<div class="day-tabs">${MENU_PLAN.map((d,i)=>`<button class="day-tab ${selectedMenuDay===i?'active':''}" onclick="selectMenuDay(${i})">${DAYS[i]}</button>`).join('')}</div>`;
  const d=MENU_PLAN[selectedMenuDay];
  h+=`<div class="kcal-summary"><div><div class="kcal-summary-val">${d.kcal.toLocaleString()} kcal</div><div class="kcal-summary-macros"><span class="mp">P: ${d.p}g</span> · <span class="mc">C: ${d.c}g</span> · <span class="mg">G: ${d.g}g</span></div></div></div>`;
  h+=`<div class="card"><div class="card-title">${d.day} · ${d.sub}</div>`;
  d.meals.forEach(m=>{
    h+=`<div class="meal-plan-item"><div class="meal-plan-head"><span class="meal-plan-label">${m.label}</span><span class="meal-plan-kcal">${m.kcal} kcal</span></div><div class="meal-plan-desc">${m.desc}</div><div class="meal-plan-macros"><span class="mp">P: ${m.p}g</span><span class="mc">C: ${m.c}g</span><span class="mg">G: ${m.g}g</span></div></div>`;
  });
  h+=`</div>`;
  document.getElementById("sec-menu").innerHTML=h;
}

function renderNotes(){
  const todayNote=state.notes[todayStr()]||"";
  const entries=Object.entries(state.notes).filter(([,v])=>v).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,15);
  let h=`<div class="card"><div class="card-title">Nota del día · ${todayStr()}</div><textarea class="input" id="noteInput" placeholder="¿Cómo te has sentido? ¿Has dormido bien?">${todayNote}</textarea><div style="margin-top:12px"><button class="btn" onclick="saveNote()">Guardar nota</button></div></div>
    <div class="card"><div class="card-title">Notas anteriores</div>${entries.length?entries.map(([d,n])=>`<div class="note-entry"><div class="note-date">${d}</div><div class="note-text">${escapeHtml(n)}</div></div>`).join(''):'<div style="text-align:center;padding:20px;font-size:13px;color:var(--text-dim)">Aún no tienes notas</div>'}</div>
    <div style="text-align:center;margin-top:16px;padding-bottom:20px"><button class="btn-danger" onclick="resetData()">Reiniciar todos los datos</button></div>`;
  document.getElementById("sec-notes").innerHTML=h;
}

// ── Actions ──
function addWeight(){const input=document.getElementById("weightInput");const w=parseFloat(input.value);if(isNaN(w)||w<40||w>200){showToast("Introduce un peso válido");return}const today=todayStr();state.weights=[...state.weights.filter(e=>e.date!==today),{date:today,value:w}].sort((a,b)=>a.date.localeCompare(b.date));saveState();showToast("Peso registrado ✓");render()}
function toggleWorkout(i){const key=`${weekId()}-${i}`;state.workouts[key]=!state.workouts[key];saveState();showToast(state.workouts[key]?"Entreno completado ✓":"Desmarcado");render()}
function toggleMeal(dayIdx,mealIdx){const key=`${weekId()}-${dayIdx}-${mealIdx}`;state.meals[key]=!state.meals[key];saveState();render()}
function selectMealDay(i){selectedMealDay=i;renderMeals()}
function selectGymDay(i){selectedGymDay=i;renderGym()}
function selectMenuDay(i){selectedMenuDay=i;renderMenu()}
function saveNote(){const input=document.getElementById("noteInput");state.notes[todayStr()]=input.value;saveState();showToast("Nota guardada ✓")}
function resetData(){if(confirm("¿Borrar todos los datos? No se puede deshacer.")){state=defaultState();localStorage.removeItem(STORAGE);showToast("Datos reiniciados");render()}}

// ── Chart ──
function drawChart(){
  const canvas=document.getElementById("weightChart");if(!canvas)return;
  const ctx=canvas.getContext("2d");const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+"px";canvas.style.height=rect.height+"px";
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;const pad={top:20,right:16,bottom:30,left:40};
  const sorted=[...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const vals=sorted.map(w=>w.value);const minV=Math.floor(Math.min(...vals)-1);const maxV=Math.ceil(Math.max(...vals)+1);
  const chartW=W-pad.left-pad.right;const chartH=H-pad.top-pad.bottom;
  const x=i=>pad.left+(i/(sorted.length-1))*chartW;
  const y=v=>pad.top+(1-(v-minV)/(maxV-minV))*chartH;
  ctx.strokeStyle="#2A2A32";ctx.lineWidth=0.5;
  for(let v=minV;v<=maxV;v++){const yy=y(v);ctx.beginPath();ctx.moveTo(pad.left,yy);ctx.lineTo(W-pad.right,yy);ctx.stroke();ctx.fillStyle="#5A5A6A";ctx.font="11px 'DM Sans'";ctx.textAlign="right";ctx.fillText(v+"",pad.left-8,yy+4)}
  ctx.fillStyle="#5A5A6A";ctx.textAlign="center";ctx.font="10px 'DM Sans'";
  const step=Math.max(1,Math.floor(sorted.length/6));
  sorted.forEach((w,i)=>{if(i%step===0||i===sorted.length-1)ctx.fillText(w.date.slice(5),x(i),H-8)});
  const grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);grad.addColorStop(0,"rgba(110,231,168,0.25)");grad.addColorStop(1,"rgba(110,231,168,0)");
  ctx.beginPath();ctx.moveTo(x(0),H-pad.bottom);sorted.forEach((w,i)=>ctx.lineTo(x(i),y(w.value)));ctx.lineTo(x(sorted.length-1),H-pad.bottom);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle="#6EE7A8";ctx.lineWidth=2.5;ctx.lineJoin="round";sorted.forEach((w,i)=>{i===0?ctx.moveTo(x(i),y(w.value)):ctx.lineTo(x(i),y(w.value))});ctx.stroke();
  sorted.forEach((w,i)=>{ctx.beginPath();ctx.arc(x(i),y(w.value),4,0,Math.PI*2);ctx.fillStyle="#6EE7A8";ctx.fill();ctx.strokeStyle="#0D0D0F";ctx.lineWidth=2;ctx.stroke()});
}

if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}
render();
